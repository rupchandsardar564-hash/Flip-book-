<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Flipbook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body{margin:0;background:#111;color:white;text-align:center;font-family:Arial}
#book{width:100%;height:90vh;position:relative;overflow:hidden}
.page{
position:absolute;
width:100%;
height:100%;
transition:transform 1s;
transform-origin:left;
backface-visibility:hidden;
}
.page img{width:100%;height:100%;object-fit:contain}
button{padding:10px 20px;margin:10px;font-size:16px}
</style>
</head>

<body>

<h2>📖 Flipbook Generator</h2>

<input type="file" id="upload" accept="application/pdf">
<button onclick="downloadBook()">Download Offline Book</button>

<div id="book"></div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let pages=[];
let current=0;

document.getElementById("upload").addEventListener("change",function(e){

pages=[];
current=0;
document.getElementById("book").innerHTML="";

const file=e.target.files[0];
const reader=new FileReader();

reader.onload=function(){
const typedarray=new Uint8Array(this.result);

pdfjsLib.getDocument(typedarray).promise.then(function(pdf){

for(let i=1;i<=pdf.numPages;i++){

pdf.getPage(i).then(function(page){

const viewport=page.getViewport({scale:1.5});
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=viewport.width;
canvas.height=viewport.height;

page.render({canvasContext:ctx,viewport:viewport}).promise.then(function(){

let img=canvas.toDataURL("image/jpeg",0.8);
pages.push(img);

let div=document.createElement("div");
div.className="page";
div.style.zIndex=1000-i;
div.innerHTML="<img src='"+img+"'>";
document.getElementById("book").appendChild(div);

});

});
}

});
};

reader.readAsArrayBuffer(file);

});

document.getElementById("book").addEventListener("click",function(){
let all=document.querySelectorAll(".page");
if(current<all.length){
all[current].style.transform="rotateY(-180deg)";
current++;
}
});

function downloadBook(){

let html=`<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook</title>
<style>
body{margin:0;background:#111}
#book{width:100vw;height:100vh;position:relative}
.page{position:absolute;width:100%;height:100%;transition:transform 1s;transform-origin:left}
.page img{width:100%;height:100%;object-fit:contain}
<\/style>
<\/head><body>
<div id="book">`;

pages.forEach((img,i)=>{
html+=`<div class="page" style="z-index:${1000-i}"><img src="${img}"></div>`;
});

html+=`</div>
<script>
let current=0;
document.getElementById("book").addEventListener("click",function(){
let all=document.querySelectorAll(".page");
if(current<all.length){
all[current].style.transform="rotateY(-180deg)";
current++;
}
});
<\/script>
<\/body><\/html>`;

let blob=new Blob([html],{type:"text/html"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="Flipbook.html";
a.click();

}

</script>

</body>
</html>
